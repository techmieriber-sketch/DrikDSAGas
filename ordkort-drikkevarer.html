<!doctype html>
<html lang="da" style="background-color:#0f1b24">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ordkort – drikkevarer</title>
    <link rel="preload" href="assets/drikkevarer-bg-16x9.png" as="image" />
    <style>
      html {
        background-color: #0f1b24;
        scrollbar-gutter: stable;
        overflow-y: scroll;
      }
      :root {
        --bg: #0f1115;
        --card: #12324a;
        --card2: #0f2433;
        --text: #e9edf5;
        --muted: #b8c0d6;
        --ring: #7aa2ff;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      html, body { margin: 0; padding: 0; min-height: 100%; }

      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        line-height: 1.5;
        min-height: 100vh;
        background-color: #0f1b24;
        background-image: url("assets/drikkevarer-bg-16x9.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: scroll;
      }

      header {
        max-width: 1100px;
        margin: 28px auto 10px;
        padding: 0 16px;
        text-align: center;
        position: relative;
      }

      .back-link {
        display: inline-block;
        margin-bottom: 8px;
        color: var(--text);
        text-decoration: underline;
        font-weight: 600;
        position: absolute;
        left: 16px;
        top: 0;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(22px, 3vw, 30px);
        letter-spacing: 0.2px;
      }

      header p {
        margin: 0 auto;
        color: #0f2433;
        max-width: 70ch;
        text-align: center;
        font-weight: 600;
        text-shadow:
          -1px -1px 0 rgba(255, 255, 255, 0.95),
          1px -1px 0 rgba(255, 255, 255, 0.95),
          -1px 1px 0 rgba(255, 255, 255, 0.95),
          1px 1px 0 rgba(255, 255, 255, 0.95);
      }

      main {
        max-width: 1100px;
        margin: 18px auto 44px;
        padding: 0 16px;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        align-items: stretch;
        min-height: 50vh;
      }

      .card {
        min-height: 320px;
        perspective: 1200px;
      }

      .flipBtn {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 320px;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        text-align: left;
        border-radius: var(--radius);
      }

      .flipBtn:focus-visible {
        outline: 3px solid var(--ring);
        outline-offset: 3px;
      }

      .inner {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 320px;
        border-radius: var(--radius);
        transform-style: preserve-3d;
        transition: transform 0.6s ease;
        box-shadow: var(--shadow);
        will-change: transform;
      }

      .card.is-flipped .inner {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        border-radius: var(--radius);
        overflow: hidden;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        background: linear-gradient(180deg, var(--card) 0%, var(--card2) 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .front {
        display: grid;
        grid-template-rows: 1fr auto;
        transform: rotateY(0deg);
      }

      .front .imgwrap {
        position: relative;
        height: 100%;
        overflow: hidden;
        background: #0b0d12;
      }

      .front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .label {
        padding: 12px 12px 14px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }

      .label strong {
        font-size: 16px;
        letter-spacing: 0.2px;
      }

      .hint {
        font-size: 12px;
        color: rgba(233, 237, 245, 0.65);
        white-space: nowrap;
      }

      .back {
        transform: rotateY(180deg);
        padding: 16px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 12px;
      }

      .back h2 {
        margin: 0;
        font-size: 17px;
        text-align: center;
        line-height: 1.3;
        color: var(--text);
      }

      .back .def {
        margin: 0;
        color: var(--text);
        font-size: 15px;
        line-height: 1.55;
        text-align: left;
        text-wrap: pretty;
        text-shadow: none;
        filter: none;
        opacity: 1;
        transform: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-smooth: always;
      }

      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: auto;
        color: rgba(233, 237, 245, 0.7);
        font-size: 12px;
      }

      .tag {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
      }

      @media (max-width: 520px) {
        .card,
        .flipBtn,
        .inner {
          min-height: 300px;
        }

        .back .def {
          font-size: 14px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <a class="back-link" href="drikkevarer.html">Tilbage</a>
      <h1>Ordkort om drikkevarer</h1>
      <p>Klik på et kort for at vende det. Ordet læses op, når du klikker.</p>
    </header>

    <main>
      <section class="grid" id="grid" aria-label="Ordkort"></section>
    </main>

    <script>
      const audioPlayer = new Audio();

      // Læg alle billeder og evt. mp3-filer i samme mappe som html-filen
      const assetFolder = "";

      const cards = [
        {
          title: "aperol Spritz",
          file: "Aperol Spritz.png",
          audio: "Aperol Spritz.mp3?v=2",
          def: "En italiensk cocktail lavet af Aperol, prosecco, danskvand og isterninger. Serveres typisk med en skive appelsin.",
          tags: ["cocktail", "italien"],
        },
        {
          title: "appelsinjuice",
          file: "Appelsinjuice.png",
          def: "Juice presset af appelsiner. En klassisk drik til morgenmad.",
          tags: ["juice", "morgenmad"],
        },
        {
          title: "danskvand",
          file: "Danskvand.png",
          def: "Vand med kulsyre. Serveres ofte med citron eller lime.",
          tags: ["kulsyre", "vand"],
        },
        {
          title: "flødelikør",
          file: "Flødelikør.png",
          def: "En sød likør lavet med fløde og alkohol. Drikkes ofte med isterninger eller i kaffe.",
          tags: ["likør", "sød"],
        },
        {
          title: "gin og tonic",
          file: "Gin og tonic.png",
          def: "En cocktail lavet af gin og tonicvand. Serveres ofte med lime eller citron.",
          tags: ["cocktail", "gin"],
        },
        {
          title: "hvedeøl",
          file: "Hvedeøl.png",
          def: "En øltype brygget med en stor del hvede. Den er ofte lys, frisk og let frugtig.",
          tags: ["øl", "hvede"],
        },
        {
          title: "hvidvin",
          file: "Hvidvin.png",
          def: "Vin lavet på grønne druer. Serveres ofte kold og passer godt til fisk og lette retter.",
          tags: ["vin", "druer"],
        },
        {
          title: "kaffe",
          file: "Kaffe.png",
          def: "En varm drik lavet af ristede og malede kaffebønner, brygget med varmt vand.",
          tags: ["varm drik", "koffein"],
        },
        {
          title: "matcha",
          file: "Matcha.png",
          audio: "Matcha.mp3?v=2",
          def: "Fintmalet grønt tepulver fra Japan, der piskes med varmt vand til en grøn te.",
          tags: ["te", "japan"],
        },
        {
          title: "mousserende vin",
          file: "Mousserende vin.png",
          def: "Vin med bobler. Den serveres kold og bruges ofte til fest eller som velkomstdrik.",
          tags: ["vin", "bobler"],
        },
        {
          title: "mørk øl",
          file: "Mørk øl.png",
          def: "En øl med mørk farve og kraftigere smag. Den kan have noter af malt, karamel eller kaffe.",
          tags: ["øl", "mørk"],
        },
        {
          title: "portvin",
          file: "Portvin.png",
          def: "En sød og stærk vin, som ofte drikkes i små glas. Den serveres tit til dessert eller ost.",
          tags: ["vin", "sød"],
        },
        {
          title: "rooibos",
          file: "Rooibos.png",
          audio: "Rooibos.mp3?v=2",
          def: "En koffeinfri urtedrik fra Sydafrika. Den har en rødbrun farve og en mild, let sød smag.",
          tags: ["te", "koffeinfri"],
        },
        {
          title: "rosé",
          file: "Rosé.png",
          audio: "Rosévin.mp3",
          def: "En vin med lyserød farve. Den serveres oftest kold og har en let og frisk smag.",
          tags: ["vin", "kold"],
        },
        {
          title: "rødvin",
          file: "Rødvin.png",
          def: "Vin lavet på blå druer. Den har en mørkerød farve og serveres ofte til kødretter.",
          tags: ["vin", "druer"],
        },
        {
          title: "sodavand",
          file: "Sodavand.png",
          def: "En sød drik med kulsyre. Den serveres ofte kold og kan have forskellige smage, for eksempel cola eller citron.",
          tags: ["kulsyre", "sød"],
        },
        {
          title: "sort te",
          file: "Sort te.png",
          def: "En varm drik lavet på teblade, som er oxiderede. Teen har en mørk farve og en kraftigere smag end grøn te.",
          tags: ["te", "varm drik"],
        },
        {
          title: "varm kakao",
          file: "Varm kakao.png",
          audio: "Kakao.mp3",
          def: "En varm, sød drik lavet med kakao og mælk eller vand. Den serveres ofte med flødeskum.",
          tags: ["varm drik", "chokolade"],
        },
        {
          title: "whisky",
          file: "Whisky.png",
          def: "En stærk spiritus lavet på korn. Den kan drikkes rent eller med isterninger.",
          tags: ["spiritus", "alkohol"],
        },
        {
          title: "æblejuice",
          file: "Æblejuice.png",
          def: "Juice lavet af æbler. Den har en sød og frisk smag og drikkes ofte kold.",
          tags: ["juice", "frugt"],
        },
      ];

      const grid = document.getElementById("grid");

      function capitalizeFirst(text) {
        if (!text) return "";
        return text.charAt(0).toUpperCase() + text.slice(1);
      }

      function createCard(item) {
        const card = document.createElement("article");
        card.className = "card";

        const audioFile =
          item.audio || item.file.replace(/\.(jpg|jpeg|png)$/i, ".mp3");

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "flipBtn";

        const titleText = capitalizeFirst(item.title);
        const defText = capitalizeFirst(item.def);

        btn.setAttribute("aria-label", `Vend ordkort: ${titleText}`);
        btn.dataset.audio = encodeURI(`${assetFolder}${audioFile}`);

        const inner = document.createElement("div");
        inner.className = "inner";

        const front = document.createElement("div");
        front.className = "face front";

        const imgwrap = document.createElement("div");
        imgwrap.className = "imgwrap";

        const img = document.createElement("img");
        img.alt = titleText;
        img.src = encodeURI(`${assetFolder}${item.file}`);
        img.loading = "eager";

        imgwrap.appendChild(img);

        const label = document.createElement("div");
        label.className = "label";

        const strong = document.createElement("strong");
        strong.textContent = titleText;

        const hint = document.createElement("span");
        hint.className = "hint";
        hint.textContent = "Klik for forklaring";

        label.appendChild(strong);
        label.appendChild(hint);

        front.appendChild(imgwrap);
        front.appendChild(label);

        const back = document.createElement("div");
        back.className = "face back";

        const h2 = document.createElement("h2");
        h2.textContent = titleText;

        const def = document.createElement("p");
        def.className = "def";
        def.textContent = defText;

        const meta = document.createElement("div");
        meta.className = "meta";

        (item.tags || []).forEach((t) => {
          const tag = document.createElement("span");
          tag.className = "tag";
          tag.textContent = capitalizeFirst(t);
          meta.appendChild(tag);
        });

        back.appendChild(h2);
        back.appendChild(def);
        back.appendChild(meta);

        inner.appendChild(front);
        inner.appendChild(back);
        btn.appendChild(inner);
        card.appendChild(btn);

        function flipCard() {
          card.classList.toggle("is-flipped");

          if (btn.dataset.audio) {
            audioPlayer.src = btn.dataset.audio;
            audioPlayer.currentTime = 0;
            audioPlayer.play().catch(() => {});
          }
        }

        btn.addEventListener("click", flipCard);

        btn.addEventListener("keydown", (e) => {
          if (e.key === " " || e.key === "Enter") {
            e.preventDefault();
            flipCard();
          }
        });

        return card;
      }

      cards.forEach((item) => grid.appendChild(createCard(item)));
    </script>
  </body>
</html>
